version: '3.9'

services:
  server:
    build: ./server
    container_name: facetime-server
    ports:
      - '4000:4000'
      # UDP range for mediasoup RTP (must match MEDIASOUP_WORKER_RTC_MIN/MAX_PORT)
      - '40000-40099:40000-40099/udp'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MEDIASOUP_LISTEN_IP=0.0.0.0
      # Set to your machine IP / EC2 public IP for real-world deployment
      - MEDIASOUP_ANNOUNCED_IP=127.0.0.1
      - CLIENT_ORIGIN=http://localhost:3000
    restart: unless-stopped
    networks:
      - facetime-net

  client:
    build: ./client
    container_name: facetime-client
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000/ws
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - facetime-net

networks:
  facetime-net:
    driver: bridge
